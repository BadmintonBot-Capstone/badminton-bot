# Blackfly S BFS-U3-23S3C stereo camera configuration.
# Full node reference generated by dump_nodes tool.

# ── Acquisition ──────────────────────────────────────────────────
fps: 50
exposure_us: 500            # IMX392 range: 6 µs – 30 s. Short = less motion blur.
exposure_auto: false

# ── Sensor ───────────────────────────────────────────────────────
width: 1920
height: 1200
pixel_format: "BayerRG8"
adc_bit_depth: "Bit10"     # {Bit10, Bit12}. Bit10 is faster.
sensor_shutter_mode: "Global"

# ── Analog ───────────────────────────────────────────────────────
gain_db: 0                 # Range: 0 – 47.99 dB. 0 = minimum noise.
gain_auto: false
black_level: 0.0           # Range: -5 .. 10
gamma_enable: false         # Disable for linear response (better for CV).

# ── White balance ────────────────────────────────────────────────
white_balance_auto: false
balance_ratio_red: 1.28     # Range: 0.25 – 4.0. Tune after calibration.
balance_ratio_blue: 2.08    # Range: 0.25 – 4.0. Tune after calibration.

# ── Chunk data (hardware-embedded timestamps) ────────────────────
chunk_mode_active: true     # Embed metadata in each frame.
chunk_timestamp: true       # Microsecond-precision exposure timestamp.

# ── Primary–secondary hardware trigger ───────────────────────────
# Primary camera drives Line2 high on each exposure (V3_3Enable).
# Secondary camera triggers on Line3 rising edge.
primary_serial: "25376120"
secondary_serial: "25376121"

# ── USB transport ────────────────────────────────────────────────
device_link_throughput_limit: 380000000   # Lower to ~250M if both share one USB controller.
